repos:
  - repo: local
    hooks:
      - id: pyrefly
        name: pyrefly
        entry: poetry run pyrefly check
        language: system
        types_or: [python, pyi]
        pass_filenames: false
      - id: black
        name: black
        entry: poetry run black
        language: system
        types_or: [python, pyi]
      - id: isort
        name: isort
        entry: poetry run isort
        language: system
        types_or: [python, pyi]
      - id: flake8
        name: flake8
        entry: poetry run flake8
        language: system
        types_or: [python, pyi]
